<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aminyo OS — Dashboard</title>
  <meta name="theme-color" content="#7C3AED">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" />
  <style>
/* ═══════════════════════════════════════════════
   AMINYO OS — Dashboard v3
   Dark Premium — Style aminyo.fr
   ═══════════════════════════════════════════════ */
:root {
  --bg:        #080812;
  --surface:   #0E0E24;
  --surface-2: #13133A;
  --violet:    #7C3AED;
  --violet-d:  #5B21B6;
  --violet-s:  0 2px 20px rgba(124,58,237,0.18), 0 0 0 1px rgba(255,255,255,0.03) inset;
  --violet-h:  0 8px 40px rgba(124,58,237,0.38), 0 0 0 1px rgba(124,58,237,0.22);
  --border:    rgba(255,255,255,0.07);
  --border-v:  rgba(124,58,237,0.18);
  --text:      #EDE9FF;
  --muted:     #9080C0;
  --dim:       #504878;
  --green:     #34D399;
  --red:       #F87171;
  --orange:    #FBBF24;
  --blue:      #60A5FA;
  --purple:    #A78BFA;
  --font-h:    'Bricolage Grotesque', sans-serif;
  --font-b:    'Plus Jakarta Sans', sans-serif;
  --radius:    16px;
  --trans:     0.25s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }

body {
  font-family: var(--font-b);
  background: var(--bg);
  background-image: radial-gradient(ellipse 100% 50% at 50% -5%, rgba(124,58,237,0.1) 0%, transparent 55%);
  background-attachment: fixed;
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── CONTAINER ───────────────────────────────── */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ── HEADER ──────────────────────────────────── */
header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(8,8,18,0.9);
  -webkit-backdrop-filter: blur(24px);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border-v);
  margin: 0 -24px 28px;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 {
  font-family: var(--font-h);
  font-size: 21px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1;
}
header h1 span {
  background: linear-gradient(135deg, #A78BFA 0%, #7C3AED 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800;
}
header p {
  font-size: 12px;
  color: var(--dim);
  font-weight: 500;
  text-align: right;
}
#status-text { color: var(--green); font-weight: 600; }

/* ── STAT CARDS ──────────────────────────────── */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.card {
  background: var(--surface-2);
  border-radius: var(--radius);
  border: 1px solid var(--border-v);
  padding: 20px 18px;
  position: relative;
  overflow: hidden;
  transition: all var(--trans);
  animation: fadeInUp 0.4s ease both;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(124,58,237,0.13) 0%, transparent 65%);
  pointer-events: none;
}
.card:hover {
  border-color: rgba(124,58,237,0.32);
  box-shadow: var(--violet-h);
  transform: translateY(-3px);
}
.card h3 {
  font-family: var(--font-b);
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
  position: relative;
}
.card .value {
  font-family: var(--font-h);
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.1;
  position: relative;
  background: linear-gradient(135deg, #C4B5FD 0%, #7C3AED 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.card .value.green  { background: linear-gradient(135deg, #A7F3D0 0%, #34D399 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.card .value.red    { background: linear-gradient(135deg, #FCA5A5 0%, #F87171 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.card .value.blue   { background: linear-gradient(135deg, #BFDBFE 0%, #60A5FA 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.card .value.purple { background: linear-gradient(135deg, #DDD6FE 0%, #A78BFA 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

/* ── SECTIONS ────────────────────────────────── */
.section {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--violet-s);
  margin-bottom: 20px;
  overflow: hidden;
}
.section h2 {
  font-family: var(--font-b);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--purple);
  padding: 14px 18px;
  border-bottom: 1px solid rgba(124,58,237,0.1);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section h2::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(124,58,237,0.25), transparent);
}

/* ── TABLES ──────────────────────────────────── */
table { width: 100%; border-collapse: collapse; font-family: var(--font-b); }
thead { background: rgba(124,58,237,0.04); }
th {
  text-align: left;
  padding: 10px 18px;
  font-size: 11px;
  font-weight: 600;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border-bottom: 1px solid rgba(124,58,237,0.1);
  white-space: nowrap;
}
td {
  padding: 11px 18px;
  font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: var(--text);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(124,58,237,0.04); }

/* ── BADGES ──────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.badge.success { background: rgba(52,211,153,0.14);  color: var(--green); }
.badge.error   { background: rgba(248,113,113,0.14); color: var(--red); }
.badge.warning { background: rgba(251,191,36,0.14);  color: var(--orange); }
.badge.info    { background: rgba(96,165,250,0.14);  color: var(--blue); }

/* ── STATUS DOT ──────────────────────────────── */
.status-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
}
.status-dot.green  { background: var(--green);  box-shadow: 0 0 6px rgba(52,211,153,0.6); }
.status-dot.red    { background: var(--red); }
.status-dot.yellow { background: var(--orange); animation: pulse 1.2s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ── LOADING ─────────────────────────────────── */
#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 80px 20px;
  color: var(--dim);
  font-size: 14px;
  font-weight: 500;
}
#loading::before {
  content: '';
  width: 32px; height: 32px;
  border: 2px solid rgba(255,255,255,0.08);
  border-top-color: var(--violet);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ERROR ───────────────────────────────────── */
.error-msg {
  background: rgba(248,113,113,0.1);
  color: var(--red);
  border-left: 3px solid rgba(248,113,113,0.5);
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 20px;
  font-size: 13px;
  font-weight: 500;
}

/* ── ANIMATIONS ──────────────────────────────── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card:nth-child(1){animation-delay:0s}
.card:nth-child(2){animation-delay:.06s}
.card:nth-child(3){animation-delay:.12s}
.card:nth-child(4){animation-delay:.18s}
.card:nth-child(5){animation-delay:.24s}
.card:nth-child(6){animation-delay:.30s}

/* ── TABS ──────────────────────────────────── */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  font-family: var(--font-b);
  font-size: 13px;
  font-weight: 600;
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--trans);
  border: 1px solid transparent;
}
.tab:hover { background: var(--surface-2); color: var(--text); }
.tab.active {
  background: var(--surface-2);
  color: var(--violet);
  border-color: var(--border-v);
  box-shadow: 0 0 0 1px rgba(124,58,237,0.25);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── DRAWER ─────────────────────────────────── */
.drawer {
  position: fixed;
  top: 0;
  right: -480px;
  width: 480px;
  max-width: 100vw;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border-v);
  box-shadow: -8px 0 40px rgba(0,0,0,0.5);
  z-index: 200;
  transition: right 0.3s ease;
  display: flex;
  flex-direction: column;
}
.drawer.open { right: 0; }
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 199;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.drawer-overlay.open { opacity: 1; pointer-events: auto; }
.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid rgba(124,58,237,0.1);
  flex-shrink: 0;
}
.drawer-header h3 {
  font-family: var(--font-h);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
}
.drawer-close {
  background: none;
  border: none;
  color: var(--dim);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 8px;
  transition: all var(--trans);
}
.drawer-close:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.drawer-body .field { margin-bottom: 14px; }
.drawer-body .field-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--dim);
  margin-bottom: 4px;
}
.drawer-body .field-value {
  font-size: 14px;
  color: var(--text);
}
.drawer-body select {
  font-family: var(--font-b);
  font-size: 13px;
  padding: 8px 12px;
  border-radius: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 100%;
  cursor: pointer;
}
.drawer-body select:focus { outline: none; border-color: var(--violet); }
.drawer-body .btn-status {
  margin-top: 16px;
  padding: 10px 20px;
  background: var(--violet);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  transition: all var(--trans);
}
.drawer-body .btn-status:hover { background: var(--violet-d); transform: translateY(-1px); }
.drawer-body .btn-status:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.drawer-body .status-msg {
  margin-top: 10px;
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 8px;
}
.drawer-body .status-msg.success { background: rgba(52,211,153,0.1); color: var(--green); }
.drawer-body .status-msg.error { background: rgba(248,113,113,0.1); color: var(--red); }

.tr-clickable { cursor: pointer; transition: background 0.2s; }
.tr-clickable:hover td { background: rgba(124,58,237,0.08) !important; }

/* ── RESPONSIVE ──────────────────────────────── */
@media (max-width: 640px) {
  .drawer { width: 100%; right: -100%; }
  .container { padding: 0 16px; }
  header { margin: 0 -16px 20px; padding: 12px 16px; }
  .stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .card .value { font-size: 26px; }
  th, td { padding: 8px 12px; font-size: 12px; }
}
@media (max-width: 400px) {
  .card .value { font-size: 22px; }
  .card { padding: 14px 12px; }
}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ <span>Aminyo</span> OS</h1>
      <p>Dashboard — <span id="status-text">Vérification...</span></p>
    </header>

    <div id="loading">Chargement des données...</div>
    <div id="content" style="display:none;">
      <div id="error-banner" class="error-msg" style="display:none;"></div>

      <!-- Onglets -->
      <div class="tabs" id="tabs-bar">
        <button class="tab active" data-tab="dashboard">📊 Dashboard</button>
        <button class="tab" data-tab="leads">📥 Leads</button>
        <button class="tab" data-tab="agents">🤖 Agents</button>
        <button class="tab" data-tab="projets">📦 Projets</button>
        <button class="tab" data-tab="finances">💰 Finances</button>
      </div>

      <!-- PANEL: Dashboard -->
      <div class="tab-panel active" id="panel-dashboard">
        <div class="stats" id="stats-row"></div>

        <div class="section">
          <h2>📋 Activité récente</h2>
          <div style="overflow-x:auto;"><table><thead><tr>
            <th>Heure</th><th>Agent</th><th>Type</th><th>Statut</th><th>Description</th>
          </tr></thead><tbody id="activity-table"></tbody></table></div>
        </div>

        <div class="section">
          <h2>🚨 Alertes (24h)</h2>
          <div style="overflow-x:auto;"><table><thead><tr>
            <th>Heure</th><th>Agent</th><th>Description</th>
          </tr></thead><tbody id="alerts-table"></tbody></table></div>
        </div>
      </div>

      <!-- PANEL: Leads -->
      <div class="tab-panel" id="panel-leads">
        <div class="section">
          <h2>📥 Tous les leads</h2>
          <div style="overflow-x:auto;"><table><thead><tr>
            <th>Date</th><th>Nom</th><th>Email</th><th>Société</th><th>Source</th><th>Score</th><th>Statut</th>
          </tr></thead><tbody id="leads-table"></tbody></table></div>
        </div>
      </div>

      <!-- PANEL: Agents -->
      <div class="tab-panel" id="panel-agents">
        <div class="section"><h2>🤖 Agents</h2><p style="padding:20px;color:var(--dim);">Chargement...</p></div>
      </div>

      <!-- PANEL: Projets (placeholder) -->
      <div class="tab-panel" id="panel-projets">
      </div>

      <!-- PANEL: Finances (placeholder) -->
      <div class="tab-panel" id="panel-finances">
      </div>

      <!-- DRAWER Leads -->
      <div class="drawer-overlay" id="drawer-overlay"></div>
      <div class="drawer" id="drawer">
        <div class="drawer-header">
          <h3 id="drawer-title">Détail</h3>
          <button class="drawer-close" id="drawer-close">✕</button>
        </div>
        <div class="drawer-body" id="drawer-body"></div>
      </div>
    </div>
  </div>

  <script>// ── STATE ──────────────────────────────────────
    let leadsCache = [];
    let selectedLead = null;
    let agentsLoaded = false;

    // ── UTILS ──────────────────────────────────────
    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text || '';
      return d.innerHTML;
    }
    function timeAgo(iso) {
      if (!iso) return '?';
      const ms = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(ms / 60000);
      if (mins < 1) return 'à l\'instant';
      if (mins < 60) return mins + ' min';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h';
      return Math.floor(hours / 24) + 'j';
    }
    function formatDate(iso) {
      if (!iso) return '?';
      return new Date(iso).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }
    function formatFullDate(iso) {
      if (!iso) return '?';
      return new Date(iso).toLocaleString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
    function statusBadge(status) {
      const map = { success: 'success', error: 'error', warning: 'warning', info: 'info' };
      return '<span class="badge ' + (map[status] || 'info') + '">' + escapeHtml(status) + '</span>';
    }
    function scoreLabel(s) {
      if (s === null || s === undefined) return '—';
      const n = Number(s);
      return n >= 80 ? '🔵 ' + n : n >= 50 ? '🟡 ' + n : n >= 20 ? '🟠 ' + n : '🔴 ' + n;
    }
    function cleanDesc(text) {
      if (!text) return '';
      try { return decodeURIComponent(text); } catch(e) { return text; }
    }
    function toArray(data) {
      if (Array.isArray(data)) return data;
      if (data && Array.isArray(data.data)) return data.data;
      if (data && Array.isArray(data.rows)) return data.rows;
      return [];
    }
    function pick(obj, keys) {
      const r = {};
      keys.forEach(k => { r[k] = obj[k]; });
      return r;
    }

    // ── DRAWER ─────────────────────────────────────
    function openDrawer(title, bodyHTML) {
      document.getElementById('drawer-title').textContent = title;
      document.getElementById('drawer-body').innerHTML = bodyHTML;
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.getElementById('drawer-close').addEventListener('click', closeDrawer);
    document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);

    // ── TABS ───────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', async () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        const panel = document.getElementById('panel-' + tab.dataset.tab);
        if (panel) panel.classList.add('active');
        const name = tab.dataset.tab;
        if (name === 'leads' && !leadsCache.length) await loadLeads();
        if (name === 'agents' && !agentsLoaded) { agentsLoaded = true; await loadAgents(); }
        if (name === 'projets') await loadProjets();
        if (name === 'finances') await loadFinances();
      });
    });

    // ── FORMAT DETAILS (shared) ────────────────────
    function formatDetails(details) {
      if (!details) return null;
      try {
        const obj = typeof details === 'string' ? JSON.parse(details) : details;
        if (obj && typeof obj === 'object') {
          const items = Object.entries(obj).map(([k, v]) => {
            let val;
            if (v === null || v === undefined) val = '—';
            else if (typeof v === 'object') val = JSON.stringify(v).substring(0, 100);
            else val = String(v).substring(0, 100);
            return '<span style="color:var(--purple)">' + escapeHtml(k) + '</span>: ' + escapeHtml(val);
          });
          return items.join('<br>');
        }
        return escapeHtml(String(details).substring(0, 300));
      } catch(e) {
        return escapeHtml(String(details).substring(0, 300));
      }
    }

    // ── ACTIVITY DRAWER (dashboard rows) ────────────
    function openActivityDrawer(log) {
      const dtlsHtml = formatDetails(log.details);
      const bodyHTML = `
        <div class="field">
          <div class="field-label">Agent</div>
          <div class="field-value" style="font-size:16px;font-weight:700;">${escapeHtml(log.agent_id || '—')}</div>
        </div>
        <div class="field">
          <div class="field-label">Type</div>
          <div class="field-value">${escapeHtml(log.type || '—')}</div>
        </div>
        <div class="field">
          <div class="field-label">Statut</div>
          <div class="field-value">${statusBadge(log.status)}</div>
        </div>
        <div class="field">
          <div class="field-label">Date</div>
          <div class="field-value">${formatFullDate(log.created_at)}</div>
        </div>
        <div class="field">
          <div class="field-label">Description</div>
          <div class="field-value" style="white-space:pre-wrap;">${escapeHtml(cleanDesc(log.description || ''))}</div>
        </div>

          msg.className = 'status-msg'; msg.textContent = '';

    function agentIdFromLog(log) {
      if (log.agent_id) {
        var id = log.agent_id.toLowerCase().replace(/[\s_-]+/g, '_');
        for (var i = 0; i < AGENTS_DEF.length; i++) {
          if (AGENTS_DEF[i].id === id) return id;
        }
        return log.agent_id;
      }
      if (log.type) {
        var key = log.type.split('.')[0].toLowerCase();
        return TYPE_TO_AGENT[key] || null;
      }
      return null;
    }

    function statutAgent(lastLog) {
      if (!lastLog) return { emoji: '\u26ab', text: 'Inactif', cls: 'inactive' };
      var ago = Date.now() - new Date(lastLog.created_at).getTime();
      if (ago > 86400000 * 3) return { emoji: '\u26ab', text: 'Inactif', cls: 'inactive' };
      if (lastLog.status === 'success' || lastLog.status === 'info') return { emoji: '\ud83d\udfe2', text: 'OK', cls: 'success' };
      if (lastLog.status === 'error') return { emoji: '\ud83d\udd34', text: 'Erreur', cls: 'error' };
      if (lastLog.status === 'warning') return { emoji: '\ud83d\udfe1', text: 'Warning', cls: 'warning' };
      return { emoji: '\u26ab', text: 'Inactif', cls: 'inactive' };
    }

    async function loadAgents() {
      var panel = document.getElementById('panel-agents');
      try {
        var res = await fetch('/api/activity?limit=5000');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var raw = await res.json();
        var logs = toArray(raw);

        var agentLogsIndex = {};
        var lastLogMap = {};
        var countTodayMap = {};
        var todayStart = new Date();
        todayStart.setHours(0, 0, 0, 0);

        for (var i = 0; i < logs.length; i++) {
          var log = logs[i];
          var id = agentIdFromLog(log);
          if (!id) continue;
          if (!agentLogsIndex[id]) agentLogsIndex[id] = [];
          if (agentLogsIndex[id].length < 20) agentLogsIndex[id].push(log);
          if (!lastLogMap[id] || new Date(log.created_at) > new Date(lastLogMap[id].created_at)) {
            lastLogMap[id] = log;
          }
          if (new Date(log.created_at).getTime() >= todayStart.getTime()) {
            countTodayMap[id] = (countTodayMap[id] || 0) + 1;
          }
        }

        panel.innerHTML = '<div class="section">' +
          '<h2>Agents Aminyo</h2>' +
          '<p style="font-size:13px;color:var(--dim);margin-bottom:12px;">' + AGENTS_DEF.length + ' agents</p>' +
          '<div style="overflow-x:auto;"><table><thead><tr>' +
          '<th>Agent</th><th>Statut</th><th>Derniere activite</th><th>Aujourd hui</th>' +
          '</tr></thead><tbody id="agents-table"></tbody></table></div></div>';

        var body = document.getElementById('agents-table');
        var rows = [];
        for (var j = 0; j < AGENTS_DEF.length; j++) {
          var a = AGENTS_DEF[j];
          var lastLog = lastLogMap[a.id];
          var st = statutAgent(lastLog);
          var count = countTodayMap[a.id] || 0;
          var dateHtml = lastLog ? formatFullDate(lastLog.created_at) : '<span style="color:var(--dim);">-</span>';
          rows.push('<tr class="tr-clickable" data-agent="' + escapeHtml(a.id) + '">' +

            '<td><span class="agent-status ' + st.cls + '">' + st.emoji + ' ' + st.text + '</span></td>' +
            '<td>' + dateHtml + '</td>' +
            '<td>' + count + '</td></tr>');
        }
        body.innerHTML = rows.join('');

        var rows2 = body.querySelectorAll('.tr-clickable');
        for (var k = 0; k < rows2.length; k++) {
          rows2[k].addEventListener('click', function() {
            var id = this.dataset.agent;
            var agentDef = null;
            for (var x = 0; x < AGENTS_DEF.length; x++) {
              if (AGENTS_DEF[x].id === id) { agentDef = AGENTS_DEF[x]; break; }
            }
            var agentLogs = agentLogsIndex[id] || [];
            openAgentDrawer(agentDef ? agentDef.label : id, agentLogs);
          });
        }

      } catch (err) {
        panel.innerHTML = '<div class="section"><h2>Agents</h2><p style="padding:20px;color:var(--red);">Erreur : ' + escapeHtml(err.message) + '</p></div>';
      }
    }

          var d = p.date || p.created_at || p.date_paiement;
          var st = (p.statut || p.status || '').toLowerCase();

          if (st === 'paye' || st === 'recu' || st === 'completed') {
            totalEncaiss += mt;
            if (d && new Date(d) >= monthStart) totalMonth += mt;
          } else {
            totalAttente += mt;
          }
        }

        panel.innerHTML =
          '<div class="section"><h2>Finances</h2>' +
          '<p style="font-size:13px;color:var(--dim);margin-bottom:12px;">' + payments.length + ' transaction(s)</p>' +
          '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;" id="finances-cards">' +
          '  <div class="finance-card"><div class="fc-label">CA ce mois</div>' +
          '    <div class="fc-value green">' + totalMonth.toLocaleString('fr-FR') + ' &euro;</div></div>' +
          '  <div class="finance-card"><div class="fc-label">En attente</div>' +
          '    <div class="fc-value orange">' + totalAttente.toLocaleString('fr-FR') + ' &euro;</div></div>' +
          '  <div class="finance-card"><div class="fc-label">Total encaisse</div>' +
          '    <div class="fc-value purple">' + totalEncaiss.toLocaleString('fr-FR') + ' &euro;</div></div>' +
          '</div>' +
          '<div style="overflow-x:auto;"><table><thead><tr>' +
          '<th>Date</th><th>Client</th><th>Description</th><th>Type</th><th>Montant</th><th>Statut</th>' +
          '</tr></thead><tbody id="finances-table"></tbody></table></div></div>';

        var body = document.getElementById('finances-table');
        if (payments.length === 0) {
          body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--dim);padding:30px;">Aucune transaction.</td></tr>';
          return;
        }

        var rows = [];
        for (var i = 0; i < payments.length; i++) {
          var p = payments[i];
          var mt = parseFloat(p.montant || p.amount || 0);
          var st = (p.statut || p.status || '').toLowerCase();
          var tp = (p.type || p.categorie || '').toLowerCase();
          var typeLabel = '';
          if (tp === 'acompte' || tp === 'deposit') typeLabel = 'Acompte';
          else if (tp === 'solde' || tp === 'balance') typeLabel = 'Solde';
          else if (tp === 'mensualite' || tp === 'monthly') typeLabel = 'Mensualite';
          else typeLabel = p.type || p.categorie || '-';

          var stClass = 'info';
          if (st === 'paye' || st === 'recu' || st === 'completed') stClass = 'success';
          else if (st === 'en_attente' || st === 'pending') stClass = 'warning';
          else if (st === 'annule' || st === 'refuse') stClass = 'error';

          var d = p.date || p.created_at || p.date_paiement;

          rows.push('<tr class="tr-clickable" data-pay-id="' + p.id + '">' +
            '<td>' + (d ? formatFullDate(d) : '-') + '</td>' +
            '<td>' + escapeHtml(p.client || p.client_name || p.nom_client || p.email || '-') + '</td>' +
            '<td>' + escapeHtml(p.libelle || p.description || p.reference || '-') + '</td>' +
            '<td>' + escapeHtml(typeLabel) + '</td>' +
            '<td><strong>' + mt.toLocaleString('fr-FR') + ' &euro;</strong></td>' +
            '<td><span class="badge ' + stClass + '">' + escapeHtml((p.statut || p.status || '').replace(/_/g, ' ')) + '</span></td></tr>');
        }
        body.innerHTML = rows.join('');

        // Clic sur transaction -> drawer
        body.querySelectorAll('.tr-clickable').forEach(function(tr) {
          tr.addEventListener('click', function() {
            var pid = this.dataset.payId;
            for (var i = 0; i < payments.length; i++) {
              if (payments[i].id == pid) {
                openPaymentDrawer(payments[i]);
                break;
              }
            }
          });
        });

      } catch (err) {
        panel.innerHTML = '<div class="section"><h2>Finances</h2><p style="padding:20px;color:var(--red);">Erreur : ' + escapeHtml(err.message) + '</p></div>';
      }
    }

    function openPaymentDrawer(p) {
      var mt = parseFloat(p.montant || p.amount || 0);
      var st = (p.statut || p.status || '').toLowerCase();
      var d = p.date || p.created_at || p.date_paiement;
      var stClass = 'info';
      if (st === 'paye' || st === 'recu' || st === 'completed') stClass = 'success';
      else if (st === 'en_attente' || st === 'pending') stClass = 'warning';
      else if (st === 'annule' || st === 'refuse') stClass = 'error';

      var bodyHTML =
        '<div class="field"><div class="field-label">Client</div>' +
        '<div class="field-value" style="font-size:16px;font-weight:700;">' + escapeHtml(p.client || p.client_name || p.nom_client || p.email || '-') + '</div></div>' +
        '<div class="field"><div class="field-label">Projet</div>' +
        '<div class="field-value">' + escapeHtml(p.project_name || p.projet || p.libelle || '-') + '</div></div>' +
        '<div class="field"><div class="field-label">Montant</div>' +
        '<div class="field-value" style="font-size:18px;font-weight:700;">' + mt.toLocaleString('fr-FR') + ' &euro;</div></div>' +
        '<div class="field"><div class="field-label">Type</div>' +
        '<div class="field-value">' + escapeHtml(p.type || p.categorie || '-') + '</div></div>' +
        '<div class="field"><div class="field-label">Statut</div>' +
        '<div class="field-value"><span class="badge ' + stClass + '">' + escapeHtml((p.statut || p.status || '').replace(/_/g, ' ')) + '</span></div></div>' +
        '<div class="field"><div class="field-label">Date</div>' +
        '<div class="field-value">' + (d ? formatFullDate(d) : '-') + '</div></div>' +
        '<div class="field"><div class="field-label">Reference</div>' +
        '<div class="field-value">' + escapeHtml(p.reference || p.numero_facture || p.ref_paiement || '-') + '</div></div>' +
        '<div class="field"><div class="field-label">Mode de paiement</div>' +
        '<div class="field-value">' + escapeHtml(p.methode || p.moyen || p.mode_paiement || p.stripe_payment_method || '-') + '</div></div>' +
        (p.notes || p.commentaire ? '<div class="field"><div class="field-label">Notes</div><div class="field-value" style="white-space:pre-wrap;">' + escapeHtml(p.notes || p.commentaire) + '</div></div>' : '');

      openDrawer('Paiement', bodyHTML);
    }

    // ── DASHBOARD ──────────────────────────────────
    function renderActivityTable(logs) {
      const actBody = document.getElementById('activity-table');
      actBody.innerHTML = logs.slice(0, 15).map(a => `
        <tr class="tr-clickable" data-activity="${a.id || a.created_at || ''}">
          <td>${formatDate(a.created_at)}</td>
          <td>${escapeHtml(a.agent_id)}</td>
          <td>${escapeHtml(a.type || '')}</td>
          <td>${statusBadge(a.status)}</td>
          <td>${escapeHtml(cleanDesc(a.description || '').substring(0, 80))}</td>
        </tr>
      `).join('');

      // Ajouter les listeners
      actBody.querySelectorAll('.tr-clickable').forEach(tr => {
        tr.addEventListener('click', () => {
          // Trouver la bonne entrée dans logs par l'index
          const idx = Array.from(tr.parentNode.children).indexOf(tr);
          if (idx >= 0 && logs[idx]) openActivityDrawer(logs[idx]);
        });
      });
    }

    async function loadDashboard() {
      try {
        const [statsRes, activityRes] = await Promise.all([
          fetch('/api/stats').then(r => r.json()),
          fetch('/api/activity?limit=30').then(r => r.json())
        ]);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('status-text').textContent = new Date().toLocaleString('fr-FR');

        // Stats cards
        const statsRow = document.getElementById('stats-row');
        const cards = [
          { label: 'Leads Nouveaux', value: statsRes.leads?.nouveaux || 0, color: 'blue' },
          { label: 'Leads Chauds (7j)', value: statsRes.leads?.recents_7j || 0, color: 'purple' },
          { label: 'Clients Actifs', value: statsRes.clients?.actifs || 0, color: 'green' },
          { label: 'CA Mois (€)', value: parseFloat(statsRes.ca_mois_eur || 0).toLocaleString('fr-FR'), color: 'green' },
          { label: 'Alertes Auj.', value: statsRes.alertes_aujourdhui || 0, color: 'red' },
          { label: 'Actions Auj.', value: statsRes.actions_aujourdhui || 0, color: 'blue' },
        ];
        statsRow.innerHTML = cards.map(c => `
          <div class="card">
            <h3>${c.label}</h3>
            <div class="value ${c.color}">${c.value}</div>
          </div>
        `).join('');

        // Activity table — cliquable
        const logs = toArray(activityRes);
        renderActivityTable(logs);

        // Alerts table
        const alertsBody = document.getElementById('alerts-table');
        const alerts = logs.filter(a => a.status === 'error').slice(0, 10);
        if (alerts.length === 0) {
          alertsBody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--dim);padding:30px;">Aucune alerte 🎉</td></tr>';
        } else {
          alertsBody.innerHTML = alerts.map(a => `
            <tr>
              <td>${formatDate(a.created_at)}</td>
              <td>${escapeHtml(a.agent_id)}</td>
              <td>${escapeHtml(cleanDesc(a.description || '').substring(0, 100))}</td>
            </tr>
          `).join('');
        }
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('error-banner').style.display = 'block';
        document.getElementById('error-banner').textContent = 'Erreur : ' + err.message;
      }
    }

    // ── INIT ───────────────────────────────────────
    loadDashboard();
    setInterval(loadDashboard, 30000);</script>
</body>
</html>
