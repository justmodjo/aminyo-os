<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aminyo OS — Dashboard</title>
  <meta name="theme-color" content="#7C3AED">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" />
  <style>
/* ═══════════════════════════════════════════════
   AMINYO OS — Dashboard v3
   Dark Premium — Style aminyo.fr
   ═══════════════════════════════════════════════ */
:root {
  --bg:        #080812;
  --surface:   #0E0E24;
  --surface-2: #13133A;
  --violet:    #7C3AED;
  --violet-d:  #5B21B6;
  --violet-s:  0 2px 20px rgba(124,58,237,0.18), 0 0 0 1px rgba(255,255,255,0.03) inset;
  --violet-h:  0 8px 40px rgba(124,58,237,0.38), 0 0 0 1px rgba(124,58,237,0.22);
  --border:    rgba(255,255,255,0.07);
  --border-v:  rgba(124,58,237,0.18);
  --text:      #EDE9FF;
  --muted:     #9080C0;
  --dim:       #504878;
  --green:     #34D399;
  --red:       #F87171;
  --orange:    #FBBF24;
  --blue:      #60A5FA;
  --purple:    #A78BFA;
  --font-h:    'Bricolage Grotesque', sans-serif;
  --font-b:    'Plus Jakarta Sans', sans-serif;
  --radius:    16px;
  --trans:     0.25s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }

body {
  font-family: var(--font-b);
  background: var(--bg);
  background-image: radial-gradient(ellipse 100% 50% at 50% -5%, rgba(124,58,237,0.1) 0%, transparent 55%);
  background-attachment: fixed;
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── CONTAINER ───────────────────────────────── */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ── HEADER ──────────────────────────────────── */
header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(8,8,18,0.9);
  -webkit-backdrop-filter: blur(24px);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border-v);
  margin: 0 -24px 28px;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 {
  font-family: var(--font-h);
  font-size: 21px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1;
}
header h1 span {
  background: linear-gradient(135deg, #A78BFA 0%, #7C3AED 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800;
}
header p {
  font-size: 12px;
  color: var(--dim);
  font-weight: 500;
  text-align: right;
}
#status-text { color: var(--green); font-weight: 600; }

/* ── STAT CARDS ──────────────────────────────── */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.card {
  background: var(--surface-2);
  border-radius: var(--radius);
  border: 1px solid var(--border-v);
  padding: 20px 18px;
  position: relative;
  overflow: hidden;
  transition: all var(--trans);
  animation: fadeInUp 0.4s ease both;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(124,58,237,0.13) 0%, transparent 65%);
  pointer-events: none;
}
.card:hover {
  border-color: rgba(124,58,237,0.32);
  box-shadow: var(--violet-h);
  transform: translateY(-3px);
}
.card h3 {
  font-family: var(--font-b);
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
  position: relative;
}
.card .value {
  font-family: var(--font-h);
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.1;
  position: relative;
  background: linear-gradient(135deg, #C4B5FD 0%, #7C3AED 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.card .value.green  { background: linear-gradient(135deg, #A7F3D0 0%, #34D399 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.card .value.red    { background: linear-gradient(135deg, #FCA5A5 0%, #F87171 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.card .value.blue   { background: linear-gradient(135deg, #BFDBFE 0%, #60A5FA 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.card .value.purple { background: linear-gradient(135deg, #DDD6FE 0%, #A78BFA 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

/* ── SECTIONS ────────────────────────────────── */
.section {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--violet-s);
  margin-bottom: 20px;
  overflow: hidden;
}
.section h2 {
  font-family: var(--font-b);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--purple);
  padding: 14px 18px;
  border-bottom: 1px solid rgba(124,58,237,0.1);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section h2::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(124,58,237,0.25), transparent);
}

/* ── TABLES ──────────────────────────────────── */
table { width: 100%; border-collapse: collapse; font-family: var(--font-b); }
thead { background: rgba(124,58,237,0.04); }
th {
  text-align: left;
  padding: 10px 18px;
  font-size: 11px;
  font-weight: 600;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border-bottom: 1px solid rgba(124,58,237,0.1);
  white-space: nowrap;
}
td {
  padding: 11px 18px;
  font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  color: var(--text);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(124,58,237,0.04); }

/* ── BADGES ──────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  border-radius: 50px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.badge.success { background: rgba(52,211,153,0.14);  color: var(--green); }
.badge.error   { background: rgba(248,113,113,0.14); color: var(--red); }
.badge.warning { background: rgba(251,191,36,0.14);  color: var(--orange); }
.badge.info    { background: rgba(96,165,250,0.14);  color: var(--blue); }

/* ── STATUS DOT ──────────────────────────────── */
.status-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
}
.status-dot.green  { background: var(--green);  box-shadow: 0 0 6px rgba(52,211,153,0.6); }
.status-dot.red    { background: var(--red); }
.status-dot.yellow { background: var(--orange); animation: pulse 1.2s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ── LOADING ─────────────────────────────────── */
#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 80px 20px;
  color: var(--dim);
  font-size: 14px;
  font-weight: 500;
}
#loading::before {
  content: '';
  width: 32px; height: 32px;
  border: 2px solid rgba(255,255,255,0.08);
  border-top-color: var(--violet);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ERROR ───────────────────────────────────── */
.error-msg {
  background: rgba(248,113,113,0.1);
  color: var(--red);
  border-left: 3px solid rgba(248,113,113,0.5);
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 20px;
  font-size: 13px;
  font-weight: 500;
}

/* ── ANIMATIONS ──────────────────────────────── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card:nth-child(1){animation-delay:0s}
.card:nth-child(2){animation-delay:.06s}
.card:nth-child(3){animation-delay:.12s}
.card:nth-child(4){animation-delay:.18s}
.card:nth-child(5){animation-delay:.24s}
.card:nth-child(6){animation-delay:.30s}

/* ── RESPONSIVE ──────────────────────────────── */
@media (max-width: 640px) {
  .container { padding: 0 16px; }
  header { margin: 0 -16px 20px; padding: 12px 16px; }
  .stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .card .value { font-size: 26px; }
  th, td { padding: 8px 12px; font-size: 12px; }
}
@media (max-width: 400px) {
  .card .value { font-size: 22px; }
  .card { padding: 14px 12px; }
}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚡ <span>Aminyo</span> OS</h1>
      <p>Dashboard — <span id="status-text">Vérification...</span></p>
    </header>

    <div id="loading">Chargement des données...</div>
    <div id="content" style="display:none;">
      <div id="error-banner" class="error-msg" style="display:none;"></div>

      <div class="stats" id="stats-row"></div>

      <div class="section">
        <h2>📋 Activité récente</h2>
        <div style="overflow-x:auto;"><table><thead><tr>
          <th>Heure</th><th>Agent</th><th>Type</th><th>Statut</th><th>Description</th><th>Détails</th>
        </tr></thead><tbody id="activity-table"></tbody></table></div>
      </div>

      <div class="section">
        <h2>🚨 Alertes (24h)</h2>
        <div style="overflow-x:auto;"><table><thead><tr>
          <th>Heure</th><th>Agent</th><th>Description</th>
        </tr></thead><tbody id="alerts-table"></tbody></table></div>
      </div>
    </div>
  </div>

  <script>
    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text || '';
      return d.innerHTML;
    }

    function timeAgo(iso) {
      if (!iso) return '?';
      const ms = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(ms / 60000);
      if (mins < 1) return 'à l\'instant';
      if (mins < 60) return mins + ' min';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + 'h';
      return Math.floor(hours / 24) + 'j';
    }

    function formatDate(iso) {
      if (!iso) return '?';
      const d = new Date(iso);
      return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    function statusBadge(status) {
      const map = { success: 'success', error: 'error', warning: 'warning', info: 'info' };
      return '<span class="badge ' + (map[status] || 'info') + '">' + escapeHtml(status) + '</span>';
    }

    async function loadDashboard() {
      try {
        const [statsRes, activityRes] = await Promise.all([
          fetch('/api/stats').then(r => r.json()),
          fetch('/api/activity?limit=30').then(r => r.json())
        ]);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('status-text').textContent = 'Dernière mise à jour : ' + new Date().toLocaleString('fr-FR');

        // Stats cards
        const statsRow = document.getElementById('stats-row');
        const cards = [
          { label: 'Leads Nouveaux', value: statsRes.leads?.nouveaux || 0, color: 'blue' },
          { label: 'Leads Chauds (7j)', value: statsRes.leads?.recents_7j || 0, color: 'purple' },
          { label: 'Clients Actifs', value: statsRes.clients?.actifs || 0, color: 'green' },
          { label: 'CA Mois (€)', value: parseFloat(statsRes.ca_mois_eur || 0).toLocaleString('fr-FR'), color: 'green' },
          { label: 'Alertes Auj.', value: statsRes.alertes_aujourdhui || 0, color: 'red' },
          { label: 'Actions Auj.', value: statsRes.actions_aujourdhui || 0, color: 'blue' },
        ];
        statsRow.innerHTML = cards.map(c => `
          <div class="card">
            <h3>${c.label}</h3>
            <div class="value ${c.color}">${c.value}</div>
          </div>
        `).join('');

        // Activity table
        const actBody = document.getElementById('activity-table');
        actBody.innerHTML = (activityRes || []).slice(0, 15).map(a => `
          <tr>
            <td>${formatDate(a.created_at)}</td>
            <td>${escapeHtml(a.agent_id)}</td>
            <td>${escapeHtml(a.type || '')}</td>
            <td>${statusBadge(a.status)}</td>
            <td>${escapeHtml((a.description || '').substring(0, 80))}</td>
            <td style="font-size:11px;color:#888;max-width:200px;overflow:hidden;">
              ${a.details ? escapeHtml(JSON.stringify(a.details).substring(0, 100)) : ''}
            </td>
          </tr>
        `).join('');

        // Alerts table
        const alertsBody = document.getElementById('alerts-table');
        const alerts = (activityRes || []).filter(a => a.status === 'error').slice(0, 10);
        if (alerts.length === 0) {
          alertsBody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#666;padding:20px;">Aucune alerte 🎉</td></tr>';
        } else {
          alertsBody.innerHTML = alerts.map(a => `
            <tr>
              <td>${formatDate(a.created_at)}</td>
              <td>${escapeHtml(a.agent_id)}</td>
              <td>${escapeHtml((a.description || '').substring(0, 100))}</td>
            </tr>
          `).join('');
        }

      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('error-banner').style.display = 'block';
        document.getElementById('error-banner').textContent = 'Erreur de chargement : ' + err.message;
      }
    }

    loadDashboard();
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
